services:
  frontend:
    build: .
    container_name: smartcloudops-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: smartcloudops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcloud
      POSTGRES_PASSWORD: smartcloud
      POSTGRES_DB: smartcloudops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcloud -d smartcloudops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
