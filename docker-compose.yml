services:
  frontend:
    build: .
    container_name: smartcloud-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - dokploy-network
      - default
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgresql:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smartcloud-frontend.rule=Host(`${DOMAIN:-cloud.otisperu.com}`)"
      - "traefik.http.services.smartcloud-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.smartcloud-frontend.entrypoints=websecure"
      - "traefik.http.routers.smartcloud-frontend.tls.certresolver=letsencrypt"

  postgresql:
    image: postgres:16-alpine
    container_name: smartcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcloud}
      POSTGRES_DB: ${POSTGRES_DB:-smartcloudops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcloud} -d ${POSTGRES_DB:-smartcloudops}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
